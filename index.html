<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEPICO — Próximamente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0f2e28;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Grid decorativo de fondo */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.03) 59px, rgba(255,255,255,0.03) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.03) 59px, rgba(255,255,255,0.03) 60px);
    pointer-events: none;
  }

  /* Acento de luz ambiental */
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,131,42,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  /* Barra superior amber */
  .bar-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, #0f6e56, #d4832a, #0f6e56);
  }

  /* Contenido central */
  .content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    padding: 24px;
  }

  /* Logo */
  .logo {
    width: 220px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  /* Próximamente */
  .proximamente {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.45s forwards;
  }

  /* Fecha grande */
  .fecha {
    font-family: 'Anton', sans-serif;
    font-size: clamp(72px, 14vw, 140px);
    color: #d4832a;
    line-height: 0.85;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.65s forwards;
  }
  .fecha-sep {
    color: rgba(212,131,42,0.35);
  }
  .fecha-sub {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.04em;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.8s forwards;
  }
  .fecha-sub strong { color: rgba(255,255,255,0.85); font-weight: 700; }

  /* Divider */
  .divider {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, transparent, rgba(212,131,42,0.5), transparent);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  /* Countdown */
  .countdown {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.0s forwards;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 72px;
  }
  .cd-num {
    font-family: 'Anton', sans-serif;
    font-size: clamp(40px, 7vw, 72px);
    color: white;
    line-height: 1;
    display: block;
  }
  .cd-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
  }
  .cd-sep {
    font-family: 'Anton', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    color: rgba(212,131,42,0.35);
    margin-top: 4px;
    line-height: 1;
  }

  /* Lugar */
  .lugar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s forwards;
  }
  .lugar-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #d4832a;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .logo { width: 160px; margin-bottom: 36px; }
    .fecha-sub { margin-bottom: 40px; }
    .countdown { gap: 2px; }
    .cd-unit { min-width: 56px; }
    .divider { margin-bottom: 24px; }
  }
</style>
</head>
